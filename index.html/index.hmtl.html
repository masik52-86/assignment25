<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Puzzle Assignment</title>
<style>
  body { font-family: Arial; margin: 0; }

 
  .page {
    display: grid;
    grid-template-columns: 1fr;
    gap: 15px;
    padding: 20px;
  }

  .info, .puzzle-section, .date {
    border: 2px solid #333;
    border-radius: 8px;
    padding: 15px;
  }


  .flex-container {
    display: flex;
    flex-wrap: wrap;
    width: 600px;
  }

  .piece {
    width: 150px;
    height: 110px;
    display: block;
  }


  .broken-piece {
    display: none;
  }
</style>
</head>
<body>

<div class="page">

  <div class="info">
    <h2>Maksym</h2>
    <p>butterflies</p>
  </div>

  <div class="puzzle-section">
    <h3>Assembled Puzzle</h3>
    <div class="flex-container">
      <img class="piece" src="images/puzzle1_A.jpg">
      <img class="piece" src="images/puzzle1_B.jpg">
      <img class="piece" src="images/puzzle1_C.jpg">
      <img class="piece" src="images/puzzle1_D.jpg">
      <img class="piece" src="images/puzzle1_E.jpg">
      <img class="piece" src="images/puzzle1_F.jpg">
      <img class="piece" src="images/puzzle1_G.jpg">
      <img class="piece" src="images/puzzle1_H.jpg">
      <img class="piece" src="images/puzzle1_I.jpg">
      <img class="piece" src="images/puzzle1_J.jpg">
      <img class="piece" src="images/puzzle1_K.jpg">
      <img class="piece" src="images/puzzle1_L.jpg">
      <img class="piece" src="images/puzzle1_M.jpg">
      <img class="piece" src="images/puzzle1_N.jpg">
      <img class="piece" src="images/puzzle1_O.jpg">
      <img class="piece" src="images/puzzle1_P.jpg">
      <img class="piece broken-piece" src="images/puzzle1_Q.jpg">
    </div>
  </div>

  <div class="date">
    <p>Date: 07/01/2026</p>
  </div>

</div>

</body>
</html>
